<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MapSaver - 地图可视化与下载工具</title>
</head>

<body>
  <div id="chart-container">
    <!-- 控制面板 (左侧) -->
    <aside class="controls">

      <!-- 侧边栏头部 (集成的 Logo 与链接) -->
      <div class="sidebar-header">
        <div class="header-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"></polygon>
            <line x1="9" y1="3" x2="9" y2="18"></line>
            <line x1="15" y1="6" x2="15" y2="21"></line>
          </svg>
          <h1>MapSaver</h1>
        </div>
        <div class="header-actions">
          <a rel="noopener" href="https://github.com/yourusername/MapSaver" target="_blank" class="header-icon-btn"
            title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z" />
            </svg>
          </a>
        </div>
      </div>

      <!-- 数据源 -->
      <details class="control-section" open>
        <summary class="section-title">数据源</summary>
        <div class="section-content">

          <div class="tabs">
            <button class="tab-btn active" data-target="tab-builtin">内置地图</button>
            <button class="tab-btn" data-target="tab-url">自定义链接</button>
            <button class="tab-btn" data-target="tab-json">JSON 文本</button>
          </div>

          <div id="tab-builtin" class="tab-content active">
            <div class="builtin-selects-row">
              <div class="control-group">
                <label for="provinceSelect">省份 / 直辖市</label>
                <div class="custom-select-wrapper">
                  <select id="provinceSelect" class="select-input">
                    <option value="100000">全国 (China)</option>
                  </select>
                  <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </div>
              </div>
              <div class="control-group" id="cityGroup" style="display: none;">
                <label for="citySelect">地级市</label>
                <div class="custom-select-wrapper">
                  <select id="citySelect" class="select-input">
                    <option value="all">-- 全省 --</option>
                  </select>
                  <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </div>
              </div>
            </div>
            <button id="loadBuiltinBtn" class="btn btn-primary w-full mt-2">加载地图</button>
            <p class="sidebar-tip">💡 提示：在地图上直接点击省份可快速下钻</p>
          </div>

          <div id="tab-url" class="tab-content">
            <div class="control-group">
              <label for="geoJsonUrl">GeoJSON 链接</label>
              <div class="input-with-button">
                <input type="text" id="geoJsonUrl" placeholder="https://"
                  value="https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json" />
                <button id="loadMapUrlBtn" class="btn btn-primary">加载</button>
              </div>
            </div>
          </div>

          <div id="tab-json" class="tab-content">
            <div class="control-group">
              <label for="geoJsonText">粘贴 GeoJSON 文本</label>
              <textarea id="geoJsonText" rows="5" class="textarea-input"
                placeholder='{"type":"FeatureCollection","features":[]}'></textarea>
              <button id="loadMapJsonBtn" class="btn btn-primary w-full mt-2">渲染地图</button>
            </div>
          </div>

        </div>
      </details>

      <!-- 地图样式 & 文本标签 (2列布局) -->
      <details class="control-section" open>
        <summary class="section-title">样式 & 标签</summary>
        <div class="section-content style-label-grid">

          <!-- 左列：地图样式 -->
          <div class="style-col">
            <div class="style-col-header">地图样式</div>

            <div class="control-group checkbox-group">
              <label class="toggle-switch">
                <input type="checkbox" id="transparentBackground" checked />
                <span class="slider"></span>
              </label>
              <span>透明背景</span>
            </div>

            <div class="color-swatches-col">
              <div class="color-swatch-item" id="backgroundColorGroup">
                <button class="color-swatch-btn" id="backgroundColor-swatch" title="背景颜色">
                  <span class="swatch-preview" id="backgroundColor-preview" style="background: #ffffff;"></span>
                </button>
                <span class="swatch-label">背景</span>
                <input type="text" data-coloris id="backgroundColor" value="#ffffff" class="coloris-hidden" />
              </div>

              <div class="color-swatch-item">
                <button class="color-swatch-btn" id="areaColor-swatch" title="区域颜色">
                  <span class="swatch-preview" id="areaColor-preview" style="background: #3b82f6;"></span>
                </button>
                <span class="swatch-label">区域</span>
                <input type="text" data-coloris id="areaColor" value="#3b82f6" class="coloris-hidden" />
              </div>

              <div class="color-swatch-item">
                <button class="color-swatch-btn" id="borderColor-swatch" title="边框颜色">
                  <span class="swatch-preview" id="borderColor-preview"
                    style="background: rgba(255,255,255,0.5);"></span>
                </button>
                <span class="swatch-label">边框</span>
                <input type="text" data-coloris id="borderColor" value="rgba(255,255,255,0.5)" class="coloris-hidden" />
              </div>
            </div>

            <div class="control-group">
              <label for="borderWidth">边框 <span class="val-display" id="borderWidthVal">1px</span></label>
              <input type="range" id="borderWidth" value="1" min="0" max="5" step="0.5" class="range-input" />
            </div>
          </div>

          <!-- 分隔线 -->
          <div class="style-divider"></div>

          <!-- 右列：文本标签 -->
          <div class="style-col">
            <div class="style-col-header">文本标签</div>

            <div class="control-group checkbox-group">
              <label class="toggle-switch">
                <input type="checkbox" id="showLabel" checked />
                <span class="slider"></span>
              </label>
              <span>显示标签</span>
            </div>

            <div class="color-swatches-col">
              <div class="color-swatch-item">
                <button class="color-swatch-btn" id="labelColor-swatch" title="标签颜色">
                  <span class="swatch-preview" id="labelColor-preview" style="background: #ffffff;"></span>
                </button>
                <span class="swatch-label">标签色</span>
                <input type="text" data-coloris id="labelColor" value="#ffffff" class="coloris-hidden" />
              </div>
            </div>

            <div class="control-group">
              <label for="labelFontSize">字号 <span class="val-display" id="labelFontSizeVal">12px</span></label>
              <input type="range" id="labelFontSize" value="12" min="8" max="24" step="1" class="range-input" />
            </div>
          </div>

        </div>
      </details>

      <!-- 导出配置 -->
      <details class="control-section" open>
        <summary class="section-title">导出配置</summary>
        <div class="section-content">

          <div class="export-options-row">
            <div class="control-group export-option">
              <label for="exportRatio">清晰度</label>
              <div class="custom-select-wrapper">
                <select id="exportRatio" class="select-input">
                  <option value="1">1x 普通</option>
                  <option value="2" selected>2x 高清</option>
                  <option value="4">4x 超清</option>
                </select>
                <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </div>
            </div>
            <div class="control-group export-option">
              <label for="exportFormat">格式</label>
              <div class="custom-select-wrapper">
                <select id="exportFormat" class="select-input">
                  <option value="png" selected>PNG</option>
                  <option value="svg">SVG</option>
                </select>
                <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </div>
            </div>
          </div>

          <button id="exportMapBtn" class="btn btn-primary w-full mt-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
              style="margin-right: 4px;">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            导出地图
          </button>

        </div>
      </details>

    </aside>

    <!-- 地图区域 (右侧) -->
    <main class="chart-main">
      <div id="mapChart"></div>
      <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <span>加载地图数据中...</span>
      </div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
